<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center Shell</title>
  <style>
    :root{
      --bg:#070b10;
      --line:#334355;
      --panel:#101720;
      --text:#ffffff;
    }
    *{box-sizing:border-box}
    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow:hidden;
    }
    .shell{
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-columns: 1fr 2fr;
      gap:12px;
      padding:12px;
      background:var(--bg);
    }
    .left{
      min-width:0;
      min-height:0;
      display:grid;
      grid-template-rows: 1fr 1fr 1fr;
      gap:12px;
    }
    .right{
      min-width:0;
      min-height:0;
    }
    .frame-wrap{
      min-width:0;
      min-height:0;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:var(--panel);
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:var(--panel);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="left">
      <div class="frame-wrap">
        <iframe
          title="Task Accounting"
          src="https://mrsbohemian.github.io/command-center/task_accounting_module.html">
        </iframe>
      </div>

      <div class="frame-wrap">
        <iframe
          title="Customer Tracking"
          src="https://mrsbohemian.github.io/command-center/customer_tracking_module.html">
        </iframe>
      </div>

      <div class="frame-wrap">
        <iframe
          title="Business Visual Carousel"
          src="https://mrsbohemian.github.io/command-center/data_visualization_carousel.html">
        </iframe>
      </div>
    </div>

    <div class="right frame-wrap">
      <iframe
        title="Calendar"
        src="https://mrsbohemian.github.io/command-center/command_center_calendar_module.html">
      </iframe>
    </div>
  </div>
</body>
</html>
