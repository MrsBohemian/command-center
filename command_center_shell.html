<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Command Center</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --line:#1f2a44;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  font-family:system-ui, sans-serif;
}

/* MAIN LAYOUT */
.shell{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns: minmax(360px, 1fr) 2fr;
  gap:18px;
  padding:18px;
  background:var(--bg);
}

/* LEFT COLUMN */
.left{
  display:grid;
  grid-template-rows: 1fr 1fr 1fr;
  gap:18px;
}

/* RIGHT SIDE (calendar) */
.right{
  display:block;
}

/* FRAME WRAPPER (THIS WAS THE PROBLEM) */
.frame-wrap{
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:var(--panel);
  padding:6px; /* gives breathing room so content isn't cut */
}

/* IFRAMES */
iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:transparent;
}
</style>
</head>

<body>

<div class="shell">

  <!-- LEFT COLUMN -->
  <div class="left">

    <div class="frame-wrap">
      <iframe src="https://mrsbohemian.github.io/command-center/task_accounting_module.html"></iframe>
    </div>

    <div class="frame-wrap">
      <iframe src="https://mrsbohemian.github.io/command-center/customer_tracking_module.html"></iframe>
    </div>

    <div class="frame-wrap">
      <iframe src="https://mrsbohemian.github.io/command-center/data_visualization_carousel.html"></iframe>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right">
    <div class="frame-wrap" style="height:100%;">
      <iframe src="https://mrsbohemian.github.io/command-center/command_center_calendar_module.html"></iframe>
    </div>
  </div>

</div>

</body>
</html>
