<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#0b1220;color:#e6ecff;font-family:sans-serif;}
.panel{padding:10px;height:100vh;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
.title{font-size:22px;}
.view{flex:1;display:flex;align-items:center;justify-content:center;font-size:40px;background:#1f2a44;border-radius:10px;}
</style>
</head>
<body>
<div class="panel">
  <div class="title">Data Visualization</div>
  <div class="view" id="view">Revenue</div>
</div>

<script>
const slides = ["Revenue $5k", "Materials $1.2k", "Debt ↓", "Profit ↑"];
let i=0;
setInterval(()=>{
  document.getElementById("view").innerText = slides[i%slides.length];
  i++;
},4000);
</script>

</body>
</html>
