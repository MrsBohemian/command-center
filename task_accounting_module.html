<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#0b1220;color:#e6ecff;font-family:sans-serif;}
.panel{display:flex;flex-direction:column;padding:10px;gap:10px;height:100vh;overflow:hidden;}
.title{display:flex;justify-content:space-between;font-size:22px;}
.bar{height:44px;background:#1f2a44;border-radius:8px;}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:14px;}
</style>
</head>
<body>
<div class="panel">
  <div class="title"><div>Task Accounting</div><div>$2,100</div></div>
  <div class="bar"></div>
  <div class="legend">
    <div>Estimating</div><div>3h</div>
    <div>Job Work</div><div>5h</div>
    <div>Admin</div><div>2h</div>
    <div>Sales</div><div>1h</div>
  </div>
</div>
</body>
</html>
