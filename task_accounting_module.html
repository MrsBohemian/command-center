<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  background:#0b1220;
  color:#e6ecff;
  font-family:sans-serif;
}

.panel{
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:10px;
  height:100vh;
  overflow:hidden;
}

.title{
  display:flex;
  justify-content:space-between;
  font-size:22px;
}

.summary{
  background:#1f2a44;
  border-radius:8px;
  padding:8px;
  font-size:14px;
  line-height:1.35;
}

.blocks{
  display:flex;
  flex-direction:column;
  gap:6px;
  overflow:auto;
  font-size:13px;
}

.block{
  background:#111a2e;
  border:1px solid #1f2a44;
  border-radius:6px;
  padding:7px;
}

.activity{
  font-weight:700;
}

.meta{
  opacity:.75;
  font-size:12px;
  margin-top:3px;
}
</style>
</head>

<body>
<div class="panel">
  <div class="title">
    <div>Task Accounting</div>
    <div id="total">0m</div>
  </div>

  <div class="summary" id="summary">
    Loading time data...
  </div>

  <div class="blocks" id="blocks"></div>
</div>

<script>
const DATA_URL = "https://cholobot-data-production.up.railway.app/tasks";

function formatTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
}

async function loadTasks(){
  const totalEl = document.getElementById("total");
  const summaryEl = document.getElementById("summary");
  const blocksEl = document.getElementById("blocks");

  try{
    const res = await fetch(DATA_URL);
    const data = await res.json();

    const blocks = data.blocks || [];
    const totalLabel = data.total_label || "0m";
    const blocksLogged = data.blocks_logged || blocks.length || 0;
    const lastBlock = blocks.length ? blocks[blocks.length - 1] : null;

    totalEl.textContent = totalLabel;

    if(!blocks.length){
      summaryEl.innerHTML = `
        <div><strong>Time accounted today:</strong> ${totalLabel}</div>
        <div><strong>Blocks logged:</strong> 0</div>
        <div><strong>Last activity:</strong> No time blocks yet.</div>
      `;
      blocksEl.innerHTML = "";
      return;
    }

    summaryEl.innerHTML = `
      <div><strong>Time accounted today:</strong> ${totalLabel}</div>
      <div><strong>Blocks logged:</strong> ${blocksLogged}</div>
      <div><strong>Last activity:</strong> ${lastBlock.activity || "—"} (${lastBlock.duration_label || ""})</div>
    `;

    blocksEl.innerHTML = "";

    blocks
      .slice()
      .reverse()
      .slice(0, 8)
      .forEach(block => {
        const div = document.createElement("div");
        div.className = "block";

        div.innerHTML = `
          <div class="activity">${block.activity || "Unnamed activity"}</div>
          <div class="meta">
            ${formatTime(block.start)}–${formatTime(block.end)}
            · ${block.duration_label || block.duration_minutes + "m"}
          </div>
        `;

        blocksEl.appendChild(div);
      });

  } catch(err){
    console.error(err);
    totalEl.textContent = "!";
    summaryEl.innerHTML = "Could not load task accounting data.";
    blocksEl.innerHTML = "";
  }
}

loadTasks();
setInterval(loadTasks, 60000);
</script>
</body>
</html>
