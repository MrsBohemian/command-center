<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Accounting Module</title>
  <style>
    :root{
      --bg:#070b10;
      --panel:#171f29;
      --panel-2:#101720;
      --line:#334355;
      --text:#ffffff;
      --muted:#b9c7d8;
      --header:#6ee7ff;
      --accent:#ffd166;
      --work:#6ee7ff;
      --admin:#8b9cff;
      --life:#7ddc9a;
      --drift:#ff7b7b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap{
      width:100vw;
      height:100vh;
      padding:14px;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .panel{
      flex:1;
      display:flex;
      flex-direction:column;
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:12px;
      padding:14px;
      gap:14px;
      min-height:0;
    }
    .title{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .title h1{
      margin:0;
      font-size:28px;
      line-height:1.1;
      color:var(--header);
      font-weight:700;
    }
    .subtitle{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }
    .money{
      text-align:right;
      white-space:nowrap;
    }
    .money .label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .money .value{
      color:var(--accent);
      font-size:30px;
      font-weight:800;
      line-height:1;
      margin-top:4px;
    }
    .bar-wrap{
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--panel-2);
      padding:12px;
    }
    .bar{
      width:100%;
      height:60px;
      border-radius:10px;
      overflow:hidden;
      display:flex;
      background:#0d131b;
      border:1px solid var(--line);
    }
    .seg{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:16px;
      color:#081018;
      min-width:48px;
    }
    .seg.work{background:var(--work)}
    .seg.admin{background:var(--admin)}
    .seg.life{background:var(--life)}
    .seg.drift{background:var(--drift)}
    .legend{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel-2);
      padding:10px 12px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .swatch{
      width:14px;
      height:14px;
      border-radius:3px;
      flex:0 0 auto;
    }
    .swatch.work{background:var(--work)}
    .swatch.admin{background:var(--admin)}
    .swatch.life{background:var(--life)}
    .swatch.drift{background:var(--drift)}
    .name{
      font-size:18px;
      font-weight:700;
    }
    .hours{
      font-size:18px;
      font-weight:800;
      color:var(--text);
      white-space:nowrap;
    }
    .bottom{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .metric{
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel-2);
      padding:12px;
    }
    .metric .k{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:12px;
      margin-bottom:6px;
    }
    .metric .v{
      color:var(--text);
      font-size:26px;
      font-weight:800;
      line-height:1.1;
    }
    @media (max-width: 1200px){
      .title h1{font-size:22px}
      .money .value{font-size:24px}
      .seg{font-size:13px}
      .name,.hours{font-size:15px}
      .metric .v{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="title">
        <div>
          <h1>Task Accounting</h1>
          <div class="subtitle">Use of time today</div>
        </div>
        <div class="money">
          <div class="label">Revenue booked</div>
          <div class="value" id="revenue">$0</div>
        </div>
      </div>

      <div class="bar-wrap">
        <div class="bar" id="timeBar"></div>
      </div>

      <div class="legend" id="legend"></div>

      <div class="bottom">
        <div class="metric">
          <div class="k">High-value share</div>
          <div class="v" id="highValue">0%</div>
        </div>
        <div class="metric">
          <div class="k">Hours tracked</div>
          <div class="v" id="hoursTracked">0.0h</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Replace this with bot-fed data later
    const data = {
      revenue: 1200,
      categories: [
        { key: "work",  name: "Revenue Work", hours: 3.5 },
        { key: "admin", name: "Admin",        hours: 1.5 },
        { key: "life",  name: "Life",         hours: 1.0 },
        { key: "drift", name: "Drift",        hours: 0.5 }
      ]
    };

    function money(n){
      return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(n);
    }

    function render(){
      const total = data.categories.reduce((sum, c) => sum + c.hours, 0);
      const highValue = data.categories
        .filter(c => c.key === "work")
        .reduce((sum, c) => sum + c.hours, 0);

      document.getElementById("revenue").textContent = money(data.revenue);
      document.getElementById("highValue").textContent = total ? Math.round((highValue / total) * 100) + "%" : "0%";
      document.getElementById("hoursTracked").textContent = total.toFixed(1) + "h";

      const bar = document.getElementById("timeBar");
      const legend = document.getElementById("legend");
      bar.innerHTML = "";
      legend.innerHTML = "";

      data.categories.forEach(cat => {
        const pct = total ? (cat.hours / total) * 100 : 0;

        const seg = document.createElement("div");
        seg.className = "seg " + cat.key;
        seg.style.width = pct + "%";
        seg.textContent = cat.hours + "h";
        bar.appendChild(seg);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="row">
            <div class="left">
              <div class="swatch ${cat.key}"></div>
              <div class="name">${cat.name}</div>
            </div>
            <div class="hours">${cat.hours.toFixed(1)}h</div>
          </div>
        `;
        legend.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
