<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Command Center Calendar</title>
<style>
:root{
  --bg:#070b10;
  --panel:#171f29;
  --panel-2:#101720;
  --line:#334355;
  --text:#ffffff;
  --muted:#b9c7d8;
  --header:#6ee7ff;
  --time:#ffd166;
  --task-bg:#1e2935;
  --task-border:#415467;
}
*{box-sizing:border-box}
html, body{width:100%;height:100%;margin:0}
body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
.wrap{height:100%;display:flex;flex-direction:column;padding:12px;gap:10px;overflow:hidden}
.status{font-size:13px;color:var(--muted);padding:0 2px;flex:0 0 auto}
#app{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px}
.header{display:grid;grid-template-columns:140px repeat(7,1fr);gap:8px;flex:0 0 auto}
.day{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px}
.dow{font-size:14px;color:var(--header);font-weight:700}
.date{font-size:18px;font-weight:700}
.row{display:grid;grid-template-columns:140px repeat(7,1fr);gap:8px;flex:1;min-height:0}
.label{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px;font-weight:700;display:flex;align-items:center;min-height:0}
.box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:5px;min-height:0;overflow:hidden}
.box.dense-1 li{font-size:15px;padding:6px 7px}
.box.dense-2 li{font-size:13px;padding:5px 6px}
.box.dense-3 li{font-size:11px;padding:4px 5px}
.box.dense-4 li{font-size:10px;padding:3px 4px}
.box.dense-5 li{font-size:8px;padding:2px 3px;line-height:1.05}

  
li{
  background:var(--task-bg);
  border:1px solid var(--task-border);
  border-radius:8px;
  font-weight:600;

  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
  line-height:1.15;
}
  ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:5px;
  min-height:0;
}
.time{color:var(--time);font-weight:800;margin-right:5px}
.empty{opacity:.45}
.error{color:#ff9b9b}
</style>
</head>
<body>
<div class="wrap">
  <div class="status" id="status">Loading calendar…</div>
  <div id="app"></div>
</div>

<script>
const DATA_SERVICE_URL = "https://cholobot-data-production.up.railway.app";
const REFRESH_MS = 30000;

const LANE_CONFIG = [
  { key: "handley_man", label: "Handley Man" },
  { key: "heaven", label: "Heaven" },
  { key: "daniel", label: "Daniel" }
];

function formatDateKey(d){
  return d.toISOString().split("T")[0];
}

function startOfToday(date = new Date()){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  return d;
}

function coerceItem(item){
  if (typeof item === "string") return { title: item };
  if (item && typeof item === "object") {
    return {
      title: item.title || item.text || "",
      time: item.time || "",
      done: item.done || false
    };
  }
  return { title: String(item || "") };
}

function normalizeSchedule(data){
  const out = {};

  LANE_CONFIG.forEach(lane => {
    out[lane.key] = {};
  });

  if (!data || typeof data !== "object") return out;

  LANE_CONFIG.forEach(lane => {
    const days = data[lane.key];

    if (!days || typeof days !== "object") return;

    Object.entries(days).forEach(([dateKey, items]) => {
      if (!Array.isArray(items)) {
        out[lane.key][dateKey] = [];
        return;
      }

      out[lane.key][dateKey] = items
        .map(coerceItem)
        .filter(x => x.title);
    });
  });

  return out;
}

function pickStartDate(){
  return startOfToday();
}

function render(scheduleData){
  const app = document.getElementById("app");
  app.innerHTML = "";

  const startDate = pickStartDate();
  const dates = [];

  const header = document.createElement("div");
  header.className = "header";
  header.appendChild(document.createElement("div"));

  for(let i = 0; i < 7; i++){
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    dates.push(d);

    const el = document.createElement("div");
    el.className = "day";
    el.innerHTML = `
      <div class="dow">${d.toLocaleDateString(undefined, { weekday: "short" }).toUpperCase()}</div>
      <div class="date">${d.getMonth() + 1}/${d.getDate()}</div>
    `;
    header.appendChild(el);
  }

  app.appendChild(header);

  LANE_CONFIG.forEach(lane => {
    const days = scheduleData[lane.key] || {};

    const row = document.createElement("div");
    row.className = "row";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = lane.label;
    row.appendChild(label);

    dates.forEach(date => {
      const key = formatDateKey(date);
      const items = days[key] || [];

      const box = document.createElement("div");
      box.className = "box";

      const count = items.length;

      const longest = items.reduce((m, item) => {
        const text = `${item.time ? item.time + " " : ""}${item.title || ""}`;
        return Math.max(m, text.length);
      }, 0);
      
      const totalChars = items.reduce((sum, item) => {
        const text = `${item.time ? item.time + " " : ""}${item.title || ""}`;
        return sum + text.length;
      }, 0);
      
      if (count >= 6 || totalChars > 90 || longest > 45) box.classList.add("dense-5");
      else if (count >= 5 || totalChars > 70 || longest > 35) box.classList.add("dense-4");
      else if (count >= 4 || totalChars > 50 || longest > 28) box.classList.add("dense-3");
      else if (count >= 3 || totalChars > 35 || longest > 20) box.classList.add("dense-2");
      else box.classList.add("dense-1");
      
      if (count === 0) box.classList.add("empty");

      const ul = document.createElement("ul");

      items.forEach(item => {
        const li = document.createElement("li");
        if (item.time) {
          li.innerHTML = `<span class="time">${item.time}</span>${item.title}`;
        } else {
          li.textContent = item.title;
        }
        ul.appendChild(li);
      });

      box.appendChild(ul);
      row.appendChild(box);
    });

    app.appendChild(row);
  });
}

async function loadCalendar(){
  const status = document.getElementById("status");

  try {
    const res = await fetch(`${DATA_SERVICE_URL}/calendar`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const raw = await res.json();
    const scheduleData = normalizeSchedule(raw);

    render(scheduleData);

    status.textContent = `Live calendar loaded • ${new Date().toLocaleTimeString()}`;
    status.classList.remove("error");
  } catch (err) {
    status.textContent = `Calendar load failed: ${err.message}`;
    status.classList.add("error");
    console.error(err);
  }
}

loadCalendar();
setInterval(loadCalendar, REFRESH_MS);
</script>
</body>
</html>
