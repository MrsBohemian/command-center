<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Command Center Calendar</title>

<style>
:root{
  --bg:#070b10;
  --panel:#171f29;
  --panel-2:#101720;
  --line:#334355;
  --text:#ffffff;
  --muted:#b9c7d8;
  --header:#6ee7ff;
  --time:#ffd166;
  --task-bg:#1e2935;
  --task-border:#415467;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
}

.wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:12px;
  gap:10px;
}

/* HEADER */
.header{
  display:grid;
  grid-template-columns:140px repeat(7,1fr);
  gap:8px;
}

.day{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px;
}

.dow{
  font-size:14px;
  color:var(--header);
  font-weight:700;
}

.date{
  font-size:18px;
  font-weight:700;
}

/* ROWS */
.row{
  display:grid;
  grid-template-columns:140px repeat(7,1fr);
  gap:8px;
  flex:1;
}

.label{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  font-weight:700;
}

.box{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

/* DEFAULT READABLE */
.box.dense-1 li{
  font-size:16px;
  padding:7px 8px;
}

/* MEDIUM */
.box.dense-2 li{
  font-size:14px;
  padding:6px 7px;
}

/* HIGH DENSITY */
.box.dense-3 li{
  font-size:12px;
  padding:5px 6px;
}

ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:5px;
}

li{
  background:var(--task-bg);
  border:1px solid var(--task-border);
  border-radius:8px;
  font-weight:600;
}

.time{
  color:var(--time);
  font-weight:800;
  margin-right:5px;
}
</style>
</head>

<body>
<div class="wrap" id="app"></div>

<script>

const scheduleData = {
  "Handley Man": {
    "2026-04-11": [],
    "2026-04-12": [],
    "2026-04-13": [
      { title: "Start fence job (Wills)" },
      { title: "Wills visit" }
    ]
  },
  "Heaven": {
    "2026-04-11": [
      { title: "Kitchen ✓" },
      { title: "Bots work" },
      { title: "Respond to Yvette & Andy" },
      { title: "Plan menu" },
      { title: "Groceries" }
    ],
    "2026-04-12": [
      { title: "Bots work" }
    ]
  },
  "Daniel": {}
};

const startDate = new Date("2026-04-11");

function formatDate(d){
  return d.toISOString().split("T")[0];
}

function render(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  const header = document.createElement("div");
  header.className = "header";

  header.appendChild(document.createElement("div"));

  let dates = [];

  for(let i=0;i<7;i++){
    const d = new Date(startDate);
    d.setDate(d.getDate()+i);
    dates.push(d);

    const el = document.createElement("div");
    el.className = "day";
    el.innerHTML = `
      <div class="dow">${d.toLocaleDateString(undefined,{weekday:'short'})}</div>
      <div class="date">${d.getMonth()+1}/${d.getDate()}</div>
    `;
    header.appendChild(el);
  }

  app.appendChild(header);

  Object.entries(scheduleData).forEach(([name, days])=>{

    const row = document.createElement("div");
    row.className = "row";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = name;
    row.appendChild(label);

    dates.forEach(date=>{
      const key = formatDate(date);
      const items = days[key] || [];

      const box = document.createElement("div");
      box.className = "box";

      const count = items.length;

      if (count >= 5) {
        box.classList.add("dense-3");
      } else if (count >= 3) {
        box.classList.add("dense-2");
      } else {
        box.classList.add("dense-1");
      }

      const ul = document.createElement("ul");

      items.forEach(item=>{
        const li = document.createElement("li");
        if(item.time){
          li.innerHTML = `<span class="time">${item.time}</span>${item.title}`;
        } else {
          li.textContent = item.title;
        }
        ul.appendChild(li);
      });

      box.appendChild(ul);
      row.appendChild(box);
    });

    app.appendChild(row);
  });
}

render();

</script>
</body>
</html>
