<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Tracking Module</title>
  <style>
    :root{
      --bg:#070b10;
      --panel:#171f29;
      --panel-2:#101720;
      --line:#334355;
      --text:#ffffff;
      --muted:#b9c7d8;
      --header:#6ee7ff;
      --accent:#ffd166;
      --item-bg:#1e2935;
      --item-border:#415467;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap{
      width:100vw;
      height:100vh;
      padding:14px;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .panel{
      flex:1;
      display:flex;
      flex-direction:column;
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:12px;
      padding:14px;
      gap:12px;
      min-height:0;
    }
    .title{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .title h1{
      margin:0;
      font-size:28px;
      line-height:1.1;
      color:var(--header);
      font-weight:700;
    }
    .subtitle{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }
    .count{
      text-align:right;
      white-space:nowrap;
    }
    .count .label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .count .value{
      color:var(--accent);
      font-size:30px;
      font-weight:800;
      line-height:1;
      margin-top:4px;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      overflow:auto;
      padding-right:4px;
    }
    .item{
      border:1px solid var(--item-border);
      background:var(--item-bg);
      border-radius:10px;
      padding:10px 12px;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:center;
    }
    .main{
      min-width:0;
    }
    .name{
      font-size:20px;
      font-weight:800;
      line-height:1.15;
      color:var(--text);
      margin-bottom:4px;
      overflow-wrap:anywhere;
    }
    .status{
      font-size:15px;
      color:var(--muted);
      line-height:1.3;
      overflow-wrap:anywhere;
    }
    .time{
      font-size:18px;
      font-weight:800;
      color:var(--accent);
      white-space:nowrap;
      align-self:start;
    }
    @media (max-width: 1200px){
      .title h1{font-size:22px}
      .count .value{font-size:24px}
      .name{font-size:17px}
      .status{font-size:13px}
      .time{font-size:15px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="title">
        <div>
          <h1>Customer Follow-Up</h1>
          <div class="subtitle">Don't forget list</div>
        </div>
        <div class="count">
          <div class="label">Open items</div>
          <div class="value" id="openCount">0</div>
        </div>
      </div>

      <div class="list" id="list"></div>
    </div>
  </div>

  <script>
    // Replace with Cholobots data later
    const data = [
      { name: "Lopez",    time: "today", status: "invoice" },
      { name: "Robinson", time: "2d",    status: "estimate" },
      { name: "Garcia",   time: "5d",    status: "follow-up" },
      { name: "Yvette",   time: "6d",    status: "response needed" },
      { name: "Andy",     time: "1w",    status: "response needed" }
    ];

    function render(){
      const list = document.getElementById("list");
      document.getElementById("openCount").textContent = data.length;
      list.innerHTML = "";

      data.forEach(item => {
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
          <div class="main">
            <div class="name">${item.name}</div>
            <div class="status">${item.status}</div>
          </div>
          <div class="time">${item.time}</div>
        `;
        list.appendChild(row);
      });
    }

    render();
  </script>
</body>
</html>
